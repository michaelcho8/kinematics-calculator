<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice">
  <!-- Soft ambient clouds scattered across the viewport. Used as a fixed-position
       overlay on body::before to extend the hero's sky vibe across the entire
       page. Opacity is intentionally low so content cards remain readable on top. -->

  <!-- Upper third — most dense, evokes the sky -->
  <ellipse cx="200"  cy="120" rx="100" ry="32" fill="#FFFFFF" opacity="0.85"/>
  <ellipse cx="280"  cy="100" rx="80"  ry="26" fill="#FFFFFF" opacity="0.85"/>

  <ellipse cx="900"  cy="200" rx="120" ry="36" fill="#FFFFFF" opacity="0.78"/>
  <ellipse cx="1000" cy="180" rx="90"  ry="28" fill="#FFFFFF" opacity="0.78"/>

  <ellipse cx="500"  cy="60"  rx="70"  ry="22" fill="#FFFFFF" opacity="0.65"/>

  <!-- Mid section — sparser -->
  <ellipse cx="1380" cy="430" rx="110" ry="34" fill="#FFFFFF" opacity="0.6"/>
  <ellipse cx="120"  cy="520" rx="85"  ry="28" fill="#FFFFFF" opacity="0.55"/>

  <!-- Lower third — atmospheric, low opacity -->
  <ellipse cx="700"  cy="700" rx="100" ry="32" fill="#FFFFFF" opacity="0.45"/>
  <ellipse cx="1100" cy="820" rx="95"  ry="30" fill="#FFFFFF" opacity="0.42"/>
  <ellipse cx="400"  cy="950" rx="80"  ry="26" fill="#FFFFFF" opacity="0.38"/>
  <ellipse cx="1500" cy="1080" rx="100" ry="32" fill="#FFFFFF" opacity="0.32"/>
</svg>
